name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_publish:
    name: Build and Push to Docker Hub
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-summarizer:latest
          # Implementing layer caching to speed up subsequent model builds
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-summarizer:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-summarizer:buildcache,mode=max

  deploy_to_local:
    name: Deploy to Local Machine (Self-Hosted Runner)
    runs-on: [self-hosted, Linux, X64]
    needs: build_and_publish

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull the latest image & Deploy Container
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/mlops-summarizer:latest"
          
          echo "Pulling the most recent image..."
          docker pull $IMAGE_TAG
          
          echo "Stopping existing container if running..."
          docker rm -f mlops-summarizer-app || true
          
          echo "Starting the new container..."
          docker run -d \
            --name mlops-summarizer-app \
            -p 8000:8000 \
            --restart unless-stopped \
            $IMAGE_TAG
